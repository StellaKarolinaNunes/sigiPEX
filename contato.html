<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 
    - primary meta tags
  -->
    <title>SigiPEX - Organize, inove e transforme com eficiência!</title>
    <meta
      name="title"
      content="SigiPEX - Organize, inove e transforme com eficiência!"
    />
    <meta
      name="description"
      content="Um sistema prático para cadastrar, gerenciar e acompanhar projetos de extensão e pesquisa, facilitando a organização acadêmica.."
    />

    <!-- 
    - favicon
  -->
    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml" />

    <!-- 
    - custom css link
  -->
    <link rel="stylesheet" href="./assets/css/login.css" />

    <!-- 
    - google font link
  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Philosopher:wght@400;700&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- 
    - preload image
  -->
    <link rel="preload" as="image" href="./assets/images/hero-banner.png" />
  </head>

<body>
       <!-- 
        - #CONTACT
      -->

        <section class="section contact" id="contact" aria-label="contact">
          <div class="container">
            <p class="section-subtitle">Contact</p>

            <h2 class="h2 section-title has-underline">
              Write me anything
              <span class="span has-before"></span>
            </h2>

            <div class="wrapper">
              <form action="" class="contact-form">
                <input
                  type="text"
                  name="name"
                  placeholder="Your Name"
                  required
                  class="input-field"
                />

                <input
                  type="email"
                  name="email_address"
                  placeholder="Your Email"
                  required
                  class="input-field"
                />

                <input
                  type="text"
                  name="subject"
                  placeholder="Subject"
                  required
                  class="input-field"
                />

                <textarea
                  name="message"
                  placeholder="Your Message"
                  class="input-field"
                ></textarea>

                <button type="submit" class="btn btn-primary">Send Now</button>
              </form>

              <ul class="contact-card">
                <li>
                  <p class="card-title">Address:</p>

                  <address class="address">
                    16, Lankaway <br />
                    Florida, USA 99544
                  </address>
                </li>

                <li>
                  <p class="card-title">Phone:</p>

                  <a href="tel:1234567890" class="card-link">123 456 7890</a>
                </li>

                <li>
                  <p class="card-title">Email:</p>

                  <a href="mailto:support@support.com" class="card-link"
                    >support@support.com</a
                  >
                </li>

                <li>
                  <p class="social-list-title h3">Connect book socials</p>

                  <ul class="social-list">
                    <li>
                      <a href="#" class="social-link">
                        <ion-icon name="logo-facebook"></ion-icon>
                      </a>
                    </li>

                    <li>
                      <a href="#" class="social-link">
                        <ion-icon name="logo-twitter"></ion-icon>
                      </a>
                    </li>

                    <li>
                      <a href="#" class="social-link">
                        <ion-icon name="logo-linkedin"></ion-icon>
                      </a>
                    </li>

                    <li>
                      <a href="#" class="social-link">
                        <ion-icon name="logo-youtube"></ion-icon>
                      </a>
                    </li>

                    <li>
                      <a href="#" class="social-link">
                        <ion-icon name="logo-whatsapp"></ion-icon>
                      </a>
                    </li>
                  </ul>
                </li>
              </ul>
            </div>
          </div>
        </section>
      </article>
    </main>
</body>
</html>
