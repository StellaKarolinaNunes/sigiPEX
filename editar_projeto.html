<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Projeto | SigiPEX</title>
  <link rel="stylesheet" href="assets/css/style_projeto.css">
  <script src="assets/js/script_projeto.js" defer></script>
  <script src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js" defer></script>
</head>
<body>
  <div class="container">
    <header>
      <h2><ion-icon name="create-outline" style="vertical-align: middle; margin-right: 10px;"></ion-icon>Editar Projeto</h2>
      <button id="voltarBtn"><ion-icon name="arrow-back-outline"></ion-icon> Painel</button>
    </header>
    <main>
      <form id="editarProjetoForm" enctype="multipart/form-data">
        <input type="hidden" id="codigo_projeto" name="codigo_projeto">
        <input type="hidden" id="imagens_existentes" name="imagens_existentes" value="">
        <input type="hidden" id="arquivos_existentes" name="arquivos_existentes" value="">
        
        <div class="form-section">
          <h4 style="color: var(--primary); margin-bottom: 20px;"><ion-icon name="information-circle-outline"></ion-icon> 1. Informações do Projeto</h4>
          <label>Nome do Projeto:</label>
          <input type="text" id="nome_projeto" name="nome_projeto" required>
          
          <label>Resumo do Projeto:</label>
          <textarea id="resumo_projeto" name="resumo_projeto" required rows="5"></textarea>
          
          <label>Código da Turma:</label>
          <input type="text" id="codigo_turma" name="codigo_turma" required>

          <label>Link do GitHub (opcional):</label>
          <input type="url" id="github_link" name="github_link" placeholder="https://github.com/usuario/projeto">
        </div>

        <div class="form-section">
          <h4 style="color: var(--primary); margin-bottom: 20px;"><ion-icon name="people-outline"></ion-icon> 2. Professores e Alunos</h4>
          <div id="coorientadoresContainer">
            <label>Coorientador(es):</label>
          </div>
          <button type="button" class="add-btn" id="addCoorientador">+ Adicionar Coorientador</button>

          <div id="alunosContainer" style="margin-top: 20px;">
            <label>Aluno(s):</label>
          </div>
          <button type="button" class="add-btn" id="addAluno">+ Adicionar Aluno</button>
        </div>

        <div class="form-section">
          <h4 style="color: var(--primary); margin-bottom: 20px;"><ion-icon name="attach-outline"></ion-icon> 3. Arquivos e Imagens</h4>
          <div id="imagensContainer">
            <label>Imagens Atuais:</label>
          </div>
          <button type="button" class="add-btn" id="addImagem" style="border-color: #3498db; color: #3498db;">📷 Adicionar Nova Imagem</button>
          <input type="file" id="imagemInput" accept=".jpg,.jpeg,.png" style="display: none;" multiple>

          <div id="arquivosContainer" style="margin-top: 20px;">
            <label>Documentação Atual:</label>
          </div>
          <button type="button" class="add-btn" id="addArquivo" style="border-color: #9b59b6; color: #9b59b6;">📄 Adicionar Novo Arquivo</button>
          <input type="file" id="arquivoInput" accept=".doc,.docx,.ppt,.pptx,.pdf" style="display: none;" multiple>
        </div>

        <button type="submit">Salvar Alterações</button>
        <p id="editarProjetoMessage" style="text-align: center; margin-top: 15px;"></p>
      </form>
    </main>
  </div>
</body>
</html>
