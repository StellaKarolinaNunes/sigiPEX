<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login/Cadastro - SigiPEX</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Philosopher:wght@400;700&family=Poppins:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <!-- Style Links -->
  <link rel="stylesheet" href="./assets/css/style.css" />
  <link rel="stylesheet" href="./assets/css/login_cadastro.css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
</head>

<body>
  <main>
    <section class="section login-section">
      <div class="container-form">
        <div class="form-box login">
          <form id="loginForm" action="processar_login.php" method="POST">
            <h1 class="h1">Login Professor</h1>
            <div class="input-box">
              <input type="email" id="email_login" name="email" placeholder="Email" required />
              <i class="bx bxs-user"></i>
            </div>
            <div class="input-box">
              <input type="password" id="senha_login" name="senha" placeholder="Senha" minlength="8" required />
              <i class="bx bxs-lock-alt"></i>
              <i class="bx bx-hide toggle-password"></i>
            </div>
            <div class="forgot-link">
              <a href="#">Recuperar senha</a>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
          </form>
        </div>

        <div class="form-box register">
          <form id="cadastroProfessor" action="processar_cadastro.php" method="POST">
            <h1 class="h1">Cadastro</h1>
            <div class="input-box">
              <input type="text" id="nome_professor" name="nome_professor" placeholder="Nome do Professor" required />
              <i class="bx bxs-user"></i>
            </div>
            <div class="input-box">
              <input type="password" id="senha_cadastro" name="senha" placeholder="Senha (Use mais de 8 caracteres)"
                minlength="8" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[\W_]).{8,}"
                title="A senha deve conter pelo menos 8 caracteres, incluindo uma letra maiúscula, uma minúscula, um número e um caractere especial."
                required />
              <i class="bx bxs-lock-alt"></i>
              <i class="bx bx-hide toggle-password"></i>
            </div>
            <div class="input-box">
              <input type="email" id="email_cadastro" name="email" placeholder="Email" required />
              <i class="bx bxs-envelope"></i>
            </div>
            <div class="input-box">
              <input type="tel" id="telefone" name="telefone" placeholder="Telefone (DD) 9XXXX-XXXX" pattern="\d{10,11}"
                maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                title="Digite apenas números (10 ou 11 dígitos)" required />
              <i class="bx bxs-phone"></i>
            </div>
            <div class="input-box">
              <input type="text" id="siape" name="siape" placeholder="SIAPE (7 ou 8 dígitos)" pattern="\d{7,8}"
                maxlength="8" oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                title="O SIAPE deve conter 7 ou 8 números" required />
              <i class="bx bxs-id-card"></i>
            </div>
            <div class="input-box">
              <input type="text" id="coordenacao_curso" name="coordenacao_curso" placeholder="Coordenação" required />
              <i class="bx bxs-book"></i>
            </div>

            <div class="terms-box">
              <label>
                <input type="checkbox" required />
                <span>Li e aceito os <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade</a>. <span class="required-star">*</span></span>
              </label>
            </div>

            <button type="submit" class="btn btn-primary">Cadastrar</button>

          </form>
        </div>

        <div class="toggle-box">
          <div class="toggle-panel toggle-left">
            <h1 class="h1" style="color: white;">Olá, bem-vindo!</h1>
            <p>Você tem uma conta?</p>
            <button class="btn btn-secondary register-btn">Cadastro</button>
          </div>
          <div class="toggle-panel toggle-right">
            <h1 class="h1" style="color: white;">Olá, bem-vindo!</h1>
            <p>Você já é cadastrado?</p>
            <button class="btn btn-secondary login-btn">Login</button>
          </div>
        </div>
      </div>
    </section>
  </main>


  <!-- Scripts -->
  <script src="./assets/js/script.js" defer></script>
  <script src="./assets/js/login_cadastro.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>

</html>
